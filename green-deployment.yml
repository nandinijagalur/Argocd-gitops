apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app-green

spec:
  replicas: 3

  selector:
    matchLabels:
      app: java-app
      version: green

  template:
    metadata:
      labels:
        app: java-app
        version: green

    spec:
      containers:
      - name: java-app

        image: project5acr.azurecr.io/java-app:44

        imagePullPolicy: Always

        ports:
        - containerPort: 80
