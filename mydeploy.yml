apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
      version: blue

  template:
    metadata:
      labels:
        app: java-app
        version: blue
    spec:
      containers:
      - name: java-app
        image: project5acr.azurecr.io/java-app:43
        imagePullPolicy: Always

        ports:
        - containerPort: 80
