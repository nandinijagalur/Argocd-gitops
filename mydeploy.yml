apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
      containers:
      - name: java-app
        image: project5acr.azurecr.io/java-app:43
        imagePullPolicy: Always
        ports:
        - containerPort: 80

        

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 50
          periodSeconds: 15
          
          

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 25
          periodSeconds: 10
          
